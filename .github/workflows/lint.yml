name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Check formatting
        run: npx prettier --check *.js

      - name: Lint JavaScript
        run: npx eslint *.js

      - name: Lint Markdown
        run: npx markdownlint-cli2 *.md
